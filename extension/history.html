<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAKE-SHA History</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body class="popup-fixed w-[280px] bg-gray-100 font-sans">
  <div class="popup-inner bg-white rounded-xl min-h-[400px] shadow-md flex flex-col">
    
    <header class="popup-header bg-[#1e2c3e] text-white px-4 py-3 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <img src="logo.png" alt="" class="h-6 w-6 rounded-md object-contain flex-shrink-0" />
        <div class="font-semibold text-base truncate">FAKE-SHA</div>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button id="btnBack" class="hover:opacity-80 transition p-1.5 rounded-full hover:bg-white/10" aria-label="Back to analyzer">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </button>
        <button
          id="btnOpenSettings"
          type="button"
          class="hover:opacity-80 transition p-1.5 rounded-full hover:bg-white/10 flex items-center justify-center flex-shrink-0"
          aria-label="Open settings"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.89 3.31.877 2.42 2.42a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.89 1.543-.877 3.31-2.42 2.42a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.89-3.31-.877-2.42-2.42a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.89-1.543.877-3.31 2.42-2.42.996.575 2.25.113 2.573-1.066z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="popup-main p-4 flex-1">
      <!-- Main history view: search + list + export -->
      <div id="historyListView">
        <h2 class="text-[#1e2c3e] font-semibold text-base mb-3">Search Records</h2>

        <div class="flex gap-2 mb-4">
          <input
            type="text"
            id="searchHistory"
            placeholder="Search by keyword or URI"
            class="flex-1 text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500"
          >
          <button class="bg-[#2563eb] text-white p-2 rounded-md hover:opacity-90">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
        </div>

        <div id="historyList" class="space-y-3">
        </div>

        <button class="mt-4 w-full flex items-center justify-center gap-2 py-2 border border-gray-300 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-50 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Export Results
        </button>
      </div>

      <!-- Full result-style detail view (hidden until a record is clicked) -->
      <div id="detailPanel" class="hidden">
        <button
          id="btnBackToRecords"
          type="button"
          class="w-full py-2 rounded-xl text-sm font-semibold border border-gray-300 text-gray-800 hover:bg-gray-50 transition mb-4"
        >
          Back to Records
        </button>
        <div id="detailContent" class="history-detail-content">
          <!-- Full result layout injected by history.js -->
        </div>
      </div>
    </main>

    <footer class="border-t border-gray-100 py-3 text-center flex-shrink-0">
      <span class="text-sm text-gray-500">Record Search Results</span>
    </footer>
  </div>
  <script src="history.js"></script>
</body>
</html>
